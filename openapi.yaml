openapi: 3.0.3

info:
  title: ODERP-ly
  description: On-Demand Emergency Response Platform API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  # -------------------------------------------------------------------------
  # Schemas — populate during EPIC-CS-02 (TASK-CS-02.2.1)
  # -------------------------------------------------------------------------
  schemas:

    # Enums
    PartnerType:
      type: string
      enum: [PANIC_SOURCE, RESPONDER_SYSTEM]

    PanicStatus:
      type: string
      enum: [PENDING, ACKNOWLEDGED, DISPATCHED, RESOLVED]

    LogTrigger:
      type: string
      enum: [OPERATOR, PARTNER_CLAIM]

    # Partner (response — never includes apiKeyHash)
    PartnerResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/PartnerType'
        webhookUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, createdAt, updatedAt]

    # Paginated wrapper
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    # PanicEvent (response)
    PanicEventResponse:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/PanicStatus'
        externalUserId:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        idempotencyKey:
          type: string
          format: uuid
        metadata:
          type: object
          nullable: true
        partnerId:
          type: string
        partner:
          $ref: '#/components/schemas/PartnerResponse'
        claimedByPartnerId:
          type: string
          nullable: true
        claimedByPartner:
          $ref: '#/components/schemas/PartnerResponse'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, status, externalUserId, latitude, longitude, idempotencyKey, partnerId, partner, createdAt, updatedAt]

    # PanicEventLog (response)
    PanicEventLogResponse:
      type: object
      properties:
        id:
          type: string
        panicId:
          type: string
        triggeredBy:
          $ref: '#/components/schemas/LogTrigger'
        operatorId:
          type: string
          nullable: true
        partnerId:
          type: string
          nullable: true
        fromStatus:
          $ref: '#/components/schemas/PanicStatus'
        toStatus:
          $ref: '#/components/schemas/PanicStatus'
        createdAt:
          type: string
          format: date-time
      required: [id, panicId, triggeredBy, fromStatus, toStatus, createdAt]

    # Operator (response — never includes passwordHash)
    OperatorResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, createdAt]

    # Request bodies
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        operator:
          $ref: '#/components/schemas/OperatorResponse'
      required: [token, operator]

    SubmitPanicRequest:
      type: object
      properties:
        externalUserId:
          type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        idempotencyKey:
          type: string
          format: uuid
          description: UUID v4; required for idempotent panic submission
        metadata:
          type: object
          nullable: true
      required: [externalUserId, latitude, longitude, idempotencyKey]

# ---------------------------------------------------------------------------
# Paths — populate during EPIC-CS-02 (TASK-CS-02.2.1)
# ---------------------------------------------------------------------------
paths:

  /api/auth/login:
    post:
      summary: Operator login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
        '401':
          description: Invalid credentials

  /api/v1/panics:
    post:
      summary: Submit a panic (PANIC_SOURCE only)
      tags: [Panics]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitPanicRequest'
      responses:
        '201':
          description: Panic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '200':
          description: Duplicate idempotencyKey from same partner — original panic returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '400':
          description: Validation error
        '401':
          description: Missing or invalid API key
        '403':
          description: Wrong partner type
        '409':
          description: Duplicate idempotencyKey from different partner

    get:
      summary: List panics (paginated)
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PanicStatus'
        - name: partnerId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated panic list
        '401':
          description: Missing or invalid JWT

  /api/v1/panics/{id}:
    get:
      summary: Get a single panic
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Panic found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found

  /api/v1/panics/{id}/claim:
    post:
      summary: Claim a panic (RESPONDER_SYSTEM only)
      tags: [Panics]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '401':
          description: Missing or invalid API key
        '403':
          description: Wrong partner type
        '409':
          description: Already claimed

  /api/v1/panics/{id}/acknowledge:
    post:
      summary: Acknowledge a panic (operator only)
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '400':
          description: Invalid state transition
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found

  /api/v1/panics/{id}/dispatch:
    post:
      summary: Dispatch a panic (operator only)
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '400':
          description: Invalid state transition
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found

  /api/v1/panics/{id}/resolve:
    post:
      summary: Resolve a panic (operator only)
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventResponse'
        '400':
          description: Invalid state transition
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found

  /api/v1/panics/{id}/logs:
    get:
      summary: Get audit log for a panic
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated audit log
        '401':
          description: Missing or invalid JWT
        '404':
          description: Panic not found

  /api/v1/panics/{id}/logs/{logId}:
    get:
      summary: Get a single audit log entry
      tags: [Panics]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanicEventLogResponse'
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found

  /api/v1/partners:
    get:
      summary: List partners (paginated)
      tags: [Partners]
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/PartnerType'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated partner list
        '401':
          description: Missing or invalid JWT

  /api/v1/partners/{id}:
    get:
      summary: Get a single partner
      tags: [Partners]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Partner found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerResponse'
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not found
